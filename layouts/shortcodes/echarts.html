<div id="echarts{{ .Get `charts_id` }}" 
  style=" width: {{.Get `width`}};
          height: {{.Get `height`}};
          margin: 0 auto"></div>
<script src="https://cdn.staticfile.org/echarts/5.1.2/echarts.min.js"></script>
<script type="text/javascript">
    // 基于准备好的dom，初始化echarts实例
    var myChart = echarts.init(document.getElementById('echarts{{ .Get `charts_id` }}'));
    // 指定图表的配置项和数据
    var option = JSON.parse({{ .Inner }})
    // 使用刚指定的配置项和数据显示图表。
    myChart.setOption(option);
</script>
